<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced SCORM</title>
<style>
body {margin:0;font-family:Arial;background:#0f172a;color:#fff;}
.container{padding:30px;}
.card{background:#1e293b;padding:25px;border-radius:12px;}
button{margin-top:10px;padding:10px 20px;background:#22c55e;border:none;border-radius:6px;color:#fff;}
.progress{height:8px;background:#334155;border-radius:10px;margin-top:20px;}
.bar{height:100%;width:0%;background:#22c55e;}
</style>

<script>
let progress=0;
let step=0;

function init(){
 if(window.API){
  API.LMSInitialize("");
  let saved=API.LMSGetValue("cmi.suspend_data");
  if(saved){
    let d=JSON.parse(saved);
    progress=d.progress||0;
    step=d.step||0;
  }
 }
 render();
}

function save(){
 if(window.API){
  API.LMSSetValue("cmi.suspend_data",JSON.stringify({progress,step}));
  API.LMSSetValue("cmi.core.lesson_status",progress===100?"completed":"incomplete");
  API.LMSCommit("");
 }
}

function next(){
 step++;
 progress=Math.round((step/3)*100);
 save();
 render();
}

function render(){
 let content="";
 if(step===0){
  content=`<h2>🎥 Video Lesson</h2>
  <video width="100%" controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
  <button onclick="next()">Continue</button>`;
 }
 else if(step===1){
  content=`<h2>📝 Quiz</h2>
  <p>What is SEO?</p>
  <button onclick="next()">Search Engine Optimization</button>`;
 }
 else{
  content=`<h2>🏆 Certificate</h2>
  <p>You completed the course!</p>
  <h3>Sabba - Certified 🎉</h3>`;
 }

 document.getElementById("content").innerHTML=content;
 document.getElementById("bar").style.width=progress+"%";
 document.getElementById("percent").innerText=progress+"% Complete";
}
</script>
</head>

<body onload="init()">
<div class="container">
 <div class="card">
  <div id="content"></div>
  <div class="progress"><div id="bar" class="bar"></div></div>
  <p id="percent">0%</p>
 </div>
</div>
</body>
</html>
