<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lumina Style Course</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial;display:flex;height:100vh;background:#f4f7fb;color:#1e293b}
.sidebar{
  width:280px;
  background:#ffffff;
  border-right:1px solid #e5e7eb;
  padding:20px;
  display:flex;
  flex-direction:column;
}
.title{font-size:18px;font-weight:600;margin-bottom:20px}
.progress-text{font-size:14px;margin-bottom:6px;color:#64748b}
.bar{height:6px;background:#e2e8f0;border-radius:6px;overflow:hidden}
.fill{height:6px;background:#38bdf8;width:0%;transition:.3s}

.lesson{
  padding:10px;
  border-radius:8px;
  margin-top:6px;
  cursor:pointer;
  background:#f1f5f9;
}
.lesson.active{
  background:#38bdf8;
  color:#fff;
}

.content{
  flex:1;
  padding:40px;
}

.card{
  background:#ffffff;
  padding:30px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

button{
  margin-top:20px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{
  background:#38bdf8;
  color:#fff;
}

.secondary{
  background:#e2e8f0;
}
</style>
</head>
<body>

<div class="sidebar">
<div class="title">Lumina Course</div>

<div class="progress-text" id="progressText">0% COMPLETE</div>
<div class="bar"><div id="bar" class="fill"></div></div>

<div id="lessonList"></div>
</div>

<div class="content">
<div class="card">
<h1 id="title"></h1>
<p id="text"></p>

<button class="secondary" onclick="prev()">Prev</button>
<button class="primary" onclick="next()">Next</button>
</div>
</div>

<script>
let API = window.parent.API;
let current = 1;

const lessons = [
{title:"Welcome", text:"This is a clean modern LMS style course UI matching your dashboard."},
{title:"Concept", text:"Here you learn core concepts in a structured and readable format."},
{title:"Application", text:"Apply your knowledge in real use cases and workflows."},
{title:"Advanced", text:"Advanced understanding with deeper insight."},
{title:"Finish", text:"Final lesson. Completion will trigger automatically."}
];

const total = lessons.length;

function render(){
  const list=document.getElementById("lessonList");
  list.innerHTML="";
  lessons.forEach((l,i)=>{
    const d=document.createElement("div");
    d.className="lesson"+(i+1===current?" active":"");
    d.innerText=(i+1)+". "+l.title;
    d.onclick=()=>{current=i+1;update()};
    list.appendChild(d);
  });
}

function update(){
  const l=lessons[current-1];
  document.getElementById("title").innerText=l.title;
  document.getElementById("text").innerText=l.text;

  let p=Math.round((current/total)*100);
  document.getElementById("progressText").innerText=p+"% COMPLETE";
  document.getElementById("bar").style.width=p+"%";

  render();

  if(API){
    API.LMSSetValue("cmi.core.lesson_location", current.toString());
    API.LMSSetValue("cmi.suspend_data", JSON.stringify({lesson:current}));
    API.LMSCommit("");
  }

  if(p===100 && API){
    API.LMSSetValue("cmi.core.lesson_status","completed");
    API.LMSCommit("");
    API.LMSFinish("");
  }
}

function next(){ if(current<total){current++;update()} }
function prev(){ if(current>1){current--;update()} }

function init(){
  if(API){
    API.LMSInitialize("");
    let d=API.LMSGetValue("cmi.suspend_data");
    if(d){
      try{current=JSON.parse(d).lesson||1}catch(e){}
    }
  }
  update();
}

window.onload=init;
</script>

</body>
</html>
